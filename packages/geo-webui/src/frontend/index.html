<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Geo-OSINT Dashboard</title>
<style>
:root {
	--bg: #0d1117;
	--surface: #161b22;
	--surface2: #21262d;
	--border: #30363d;
	--text: #e6edf3;
	--text2: #8b949e;
	--accent: #58a6ff;
	--green: #3fb950;
	--yellow: #d29922;
	--red: #f85149;
	--radius: 6px;
	--font: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	background: var(--bg);
	color: var(--text);
	font: 14px/1.6 var(--font);
	padding: 20px;
	min-height: 100vh;
}
header {
	display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
	flex-wrap: wrap;
}
header h1 { font-size: 20px; font-weight: 600; color: var(--accent); }
header .subtitle { color: var(--text2); font-size: 13px; }

.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab {
	padding: 8px 16px; cursor: pointer; border-radius: var(--radius) var(--radius) 0 0;
	background: transparent; color: var(--text2); border: none; font: 13px var(--font);
	transition: background 0.15s, color 0.15s;
}
.tab:hover { background: var(--surface); color: var(--text); }
.tab.active { background: var(--surface); color: var(--accent); border-bottom: 2px solid var(--accent); }

.panel { display: none; }
.panel.active { display: block; }

.card {
	background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
	padding: 16px; margin-bottom: 12px;
}
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }

.form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
.form-row label { display: flex; flex-direction: column; font-size: 12px; color: var(--text2); gap: 4px; }
.form-row input, .form-row select, .form-row textarea {
	background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
	padding: 6px 10px; color: var(--text); font: 13px var(--font); width: 120px;
}
.form-row input:focus, .form-row textarea:focus { outline: none; border-color: var(--accent); }
.form-row textarea { width: 100%; min-height: 80px; resize: vertical; }
.form-row button {
	background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
	padding: 7px 18px; font: 13px var(--font); font-weight: 600; cursor: pointer;
	transition: opacity 0.15s; white-space: nowrap;
}
.form-row button:hover { opacity: 0.85; }
.form-row button:disabled { opacity: 0.5; cursor: not-allowed; }
button.danger { background: var(--red); }
button.secondary { background: var(--surface2); color: var(--text); }

.log-stream {
	background: #000; border: 1px solid var(--border); border-radius: var(--radius);
	padding: 12px; font: 12px/1.5 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
	max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;
}
.log-entry { color: var(--text2); }
.log-entry.stage { color: var(--accent); }
.log-entry.done { color: var(--green); }
.log-entry.error { color: var(--red); }
.timestamp { color: #484f58; margin-right: 6px; }

.evidence-grid {
	display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;
}
.evidence-card {
	background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
	overflow: hidden; transition: border-color 0.15s;
}
.evidence-card:hover { border-color: var(--accent); }
.evidence-card img { width: 100%; height: 140px; object-fit: cover; display: block; background: #000; }
.evidence-card .meta { padding: 8px; }
.evidence-card .meta .source { font-size: 11px; color: var(--text2); }
.evidence-card .meta .date { font-size: 11px; color: var(--text2); }

.pagination { display: flex; gap: 6px; align-items: center; margin-top: 12px; }
.pagination button {
	padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--radius);
	background: var(--surface); color: var(--text); cursor: pointer; font: 12px var(--font);
}
.pagination button:hover { background: var(--surface2); }
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

.empty-state { color: var(--text2); text-align: center; padding: 40px 20px; font-size: 13px; }

.run-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.run-table th { text-align: left; color: var(--text2); font-weight: 500; padding: 6px 10px; border-bottom: 1px solid var(--border); }
.run-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.run-table .status-badge {
	display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
}
.status-badge.pending { background: #1f2937; color: var(--text2); }
.status-badge.running_01, .status-badge.running_02, .status-badge.running_03, .status-badge.running_04 { background: #0e2a3b; color: var(--accent); }
.status-badge.awaiting_review { background: #2a1f0e; color: var(--yellow); }
.status-badge.completed { background: #0e2a1a; color: var(--green); }
.status-badge.failed { background: #2a0e0e; color: var(--red); }

.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.settings-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text2); }
.settings-grid input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; color: var(--text); font: 13px var(--font); width: 100%; }
.settings-grid input:focus { outline: none; border-color: var(--accent); }
.settings-actions { display: flex; gap: 8px; margin-top: 12px; }

.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.panel-header .count { color: var(--text2); font-size: 12px; }
</style>
</head>
<body>

<header>
	<h1>Geo-OSINT</h1>
	<span class="subtitle">pipeline dashboard</span>
</header>

<div class="tabs">
	<button class="tab active" data-tab="run">Run</button>
	<button class="tab" data-tab="runs">Runs</button>
	<button class="tab" data-tab="evidence">Evidence</button>
	<button class="tab" data-tab="settings">Settings</button>
</div>

<!-- ── Run Tab ──────────────────────────────────────────────────── -->
<div id="panel-run" class="panel active">

	<div class="card">
		<h3>Start Pipeline Run</h3>
		<div class="form-row">
			<label>Latitude
				<input id="input-lat" type="number" step="any" value="" placeholder="47.3769" />
			</label>
			<label>Longitude
				<input id="input-lon" type="number" step="any" value="" placeholder="8.5417" />
			</label>
			<button id="btn-start">Start Run</button>
		</div>
		<div id="start-error" style="color:var(--red);font-size:12px;display:none"></div>
	</div>

	<div id="run-card" class="card" style="display:none">
		<div class="panel-header">
			<h3 id="run-title">Run <span id="run-id-display"></span></h3>
			<span id="run-state-badge" class="status-badge"></span>
		</div>
		<div id="log-stream" class="log-stream"></div>
	</div>

</div>

<!-- ── Runs Tab ─────────────────────────────────────────────────── -->
<div id="panel-runs" class="panel">
	<div class="card">
		<h3>Active &amp; Recent Runs</h3>
		<table class="run-table">
			<thead>
				<tr>
					<th>ID</th>
					<th>State</th>
					<th>Lat</th>
					<th>Lon</th>
					<th>Created</th>
					<th>Error</th>
				</tr>
			</thead>
			<tbody id="runs-tbody"></tbody>
		</table>
		<div class="form-row" style="margin-top:8px">
			<button id="btn-refresh-runs" class="secondary">Refresh</button>
		</div>
	</div>
</div>

<!-- ── Evidence Tab ─────────────────────────────────────────────── -->
<div id="panel-evidence" class="panel">

	<div class="card">
		<h3>Browse Evidence</h3>
		<div class="form-row">
			<label>Geohash prefix
				<input id="evidence-geohash" type="text" placeholder="u12xyz" />
			</label>
			<label>Limit
				<input id="evidence-limit" type="number" value="50" min="1" max="500" style="width:80px" />
			</label>
			<button id="btn-search-evidence">Search</button>
			<button id="btn-all-evidence" class="secondary">All</button>
		</div>
	</div>

	<div id="evidence-grid" class="evidence-grid"></div>
	<div id="evidence-empty" class="empty-state">No evidence found. Run a pipeline first.</div>
	<div class="pagination" id="evidence-pagination" style="display:none">
		<button id="evidence-prev" disabled>Prev</button>
		<span id="evidence-info"></span>
		<button id="evidence-next">Next</button>
	</div>

</div>

<!-- ── Settings Tab ─────────────────────────────────────────────── -->
<div id="panel-settings" class="panel">
	<div class="card">
		<h3>Settings</h3>
		<div class="settings-grid">
			<label>Workspace Root
				<input id="set-workspace" type="text" />
			</label>
			<label>Storage Root
				<input id="set-storage" type="text" />
			</label>
			<label>Search Radius (m)
				<input id="set-radius" type="number" />
			</label>
		<label>KartaView Token
			<input id="set-token" type="password" />
		</label>
		<label>Google Maps API Key
			<input id="set-gmaps-key" type="password" />
		</label>
		</div>
		<div class="settings-actions">
			<button id="btn-save-settings">Save</button>
			<button id="btn-load-settings" class="secondary">Reload</button>
		</div>
		<div id="settings-status" style="font-size:12px;color:var(--green);margin-top:6px"></div>
	</div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let currentRunId = null;
let eventSource = null;
let evidenceOffset = 0;
const EVIDENCE_PAGE = 50;

// ── Tab switching ──────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach((tab) => {
	tab.addEventListener('click', () => {
		document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
		document.querySelectorAll('.panel').forEach((p) => p.classList.remove('active'));
		tab.classList.add('active');
		document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
	});
});

// ── Log helper ─────────────────────────────────────────────────────────
function addLog(text, cls = '') {
	const el = document.getElementById('log-stream');
	if (!el) return;
	const entry = document.createElement('div');
	entry.className = 'log-entry' + (cls ? ' ' + cls : '');
	const ts = new Date().toLocaleTimeString();
	entry.innerHTML = `<span class="timestamp">${ts}</span>${text}`;
	el.appendChild(entry);
	el.scrollTop = el.scrollHeight;
}

// ── Start Run ──────────────────────────────────────────────────────────
async function startRun() {
	const lat = parseFloat(document.getElementById('input-lat').value);
	const lon = parseFloat(document.getElementById('input-lon').value);
	const errEl = document.getElementById('start-error');
	errEl.style.display = 'none';

	if (isNaN(lat) || isNaN(lon)) {
		errEl.textContent = 'Enter valid latitude and longitude.';
		errEl.style.display = 'block';
		return;
	}
	if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
		errEl.textContent = 'Coordinates out of range.';
		errEl.style.display = 'block';
		return;
	}

	try {
		const res = await fetch('/runs', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ lat, lon }),
		});
		if (!res.ok) {
			const e = await res.json();
			errEl.textContent = 'Error: ' + (e.error || res.statusText);
			errEl.style.display = 'block';
			return;
		}
		const { runId } = await res.json();
		connectRun(runId);
	} catch (err) {
		errEl.textContent = 'Network error: ' + err.message;
		errEl.style.display = 'block';
	}
}

document.getElementById('btn-start').addEventListener('click', startRun);
document.getElementById('input-lat').addEventListener('keydown', (e) => { if (e.key === 'Enter') startRun(); });
document.getElementById('input-lon').addEventListener('keydown', (e) => { if (e.key === 'Enter') startRun(); });

// ── SSE Connection ─────────────────────────────────────────────────────
function connectRun(runId) {
	// Clean up previous
	if (eventSource) { eventSource.close(); }
	currentRunId = runId;

	const card = document.getElementById('run-card');
	card.style.display = 'block';
	document.getElementById('run-id-display').textContent = runId.slice(0, 8) + '…';
	document.getElementById('log-stream').innerHTML = '';
	addLog('Connecting to run...', 'stage');

	eventSource = new EventSource(`/runs/${runId}/events`);
	eventSource.onmessage = (e) => {
		const event = JSON.parse(e.data);
		handleEvent(event);
	};
	eventSource.onerror = () => {
		addLog('SSE connection closed', 'error');
	};
}

function handleEvent(event) {
	const badge = document.getElementById('run-state-badge');
	badge.textContent = event.state || event.type || '';
	badge.className = 'status-badge ' + (event.state || event.type || '');

	switch (event.type) {
		case 'state':
			badge.textContent = event.state;
			break;
		case 'stage_start':
			addLog('Stage: ' + event.stage, 'stage');
			break;
		case 'stage_end':
			addLog('Stage ' + event.stage + ' complete', 'done');
			break;
		case 'run_complete':
			addLog('Pipeline complete!', 'done');
			badge.textContent = 'completed';
			badge.className = 'status-badge completed';
			break;
		case 'run_error':
			addLog('Error: ' + event.error, 'error');
			badge.textContent = 'failed';
			badge.className = 'status-badge failed';
			break;
	}
}

// ── Runs Tab ───────────────────────────────────────────────────────────
async function listRuns() {
	try {
		const res = await fetch('/runs');
		const runs = await res.json();
		const tbody = document.getElementById('runs-tbody');
		if (runs.length === 0) {
			tbody.innerHTML = '<tr><td colspan="6" style="color:var(--text2);text-align:center">No runs yet</td></tr>';
			return;
		}
		tbody.innerHTML = runs.map((r) => `
			<tr>
				<td><a href="#" onclick="connectRun('${r.id}');return false" style="color:var(--accent)">${r.id.slice(0, 8)}…</a></td>
				<td><span class="status-badge ${r.state}">${r.state}</span></td>
				<td>${r.lat.toFixed(4)}</td>
				<td>${r.lon.toFixed(4)}</td>
				<td>${new Date(r.createdAt).toLocaleString()}</td>
				<td style="color:var(--red);font-size:11px">${r.error || ''}</td>
			</tr>
		`).join('');
	} catch (err) {
		document.getElementById('runs-tbody').innerHTML =
			`<tr><td colspan="6" style="color:var(--red)">Failed to load: ${err.message}</td></tr>`;
	}
}

document.getElementById('btn-refresh-runs').addEventListener('click', listRuns);

// ── Evidence Tab ───────────────────────────────────────────────────────
async function searchEvidence(geohash = '', limit = EVIDENCE_PAGE, append = false) {
	if (!append) {
		evidenceOffset = 0;
	}
	const params = new URLSearchParams();
	if (geohash) params.set('geohash', geohash);
	params.set('limit', String(limit));

	try {
		const res = await fetch('/evidence?' + params.toString());
		const data = await res.json();
		renderEvidence(data.records || [], append);
	} catch (err) {
		document.getElementById('evidence-grid').innerHTML =
			`<div class="empty-state">Error: ${err.message}</div>`;
	}
}

function renderEvidence(records, append = false) {
	const grid = document.getElementById('evidence-grid');
	const empty = document.getElementById('evidence-empty');
	const pag = document.getElementById('evidence-pagination');

	if (records.length === 0 && !append) {
		grid.innerHTML = '';
		empty.style.display = 'block';
		pag.style.display = 'none';
		return;
	}
	empty.style.display = 'none';

	if (!append) grid.innerHTML = '';

	records.forEach((r) => {
		const card = document.createElement('div');
		card.className = 'evidence-card';
		const imgPath = r.path || '';
		const imgSrc = imgPath ? '/evidence-file?path=' + encodeURIComponent(imgPath) : '';
		card.innerHTML = `
			${imgSrc ? `<img src="${imgSrc}" alt="" onerror="this.style.display='none'" />` : '<div style="height:140px;background:#000"></div>'}
			<div class="meta">
				<div class="source">${r.source || 'unknown'}</div>
				<div class="date">${r.capturedAt ? new Date(r.capturedAt).toLocaleString() : ''}</div>
			</div>`;
		grid.appendChild(card);
	});

	evidenceOffset += records.length;
	pag.style.display = 'flex';
	document.getElementById('evidence-info').textContent = `${evidenceOffset} loaded`;
}

document.getElementById('btn-search-evidence').addEventListener('click', () => {
	const gh = document.getElementById('evidence-geohash').value.trim();
	const lim = parseInt(document.getElementById('evidence-limit').value) || 50;
	searchEvidence(gh, lim);
});

document.getElementById('btn-all-evidence').addEventListener('click', () => {
	document.getElementById('evidence-geohash').value = '';
	searchEvidence('', 50);
});

// ── Settings ───────────────────────────────────────────────────────────
async function loadSettings() {
	try {
		const res = await fetch('/settings');
		const s = await res.json();
		document.getElementById('set-workspace').value = s.workspaceRoot || '';
		document.getElementById('set-storage').value = s.storageRoot || '';
		document.getElementById('set-radius').value = s.searchRadius || 100;
		document.getElementById('set-token').value = s.kartaviewAuthToken || '';
		document.getElementById('set-gmaps-key').value = s.googleMapsApiKey || '';
	} catch (err) {
		document.getElementById('settings-status').textContent = 'Failed: ' + err.message;
		document.getElementById('settings-status').style.color = 'var(--red)';
	}
}

async function saveSettings() {
	const settings = {
		workspaceRoot: document.getElementById('set-workspace').value,
		storageRoot: document.getElementById('set-storage').value,
		searchRadius: parseInt(document.getElementById('set-radius').value) || 100,
		kartaviewAuthToken: document.getElementById('set-token').value || undefined,
		googleMapsApiKey: document.getElementById('set-gmaps-key').value || undefined,
	};
	try {
		const res = await fetch('/settings', {
			method: 'PUT',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify(settings),
		});
		const s = await res.json();
		const status = document.getElementById('settings-status');
		status.textContent = 'Settings saved.';
		status.style.color = 'var(--green)';
	} catch (err) {
		const status = document.getElementById('settings-status');
		status.textContent = 'Failed: ' + err.message;
		status.style.color = 'var(--red)';
	}
}

document.getElementById('btn-save-settings').addEventListener('click', saveSettings);
document.getElementById('btn-load-settings').addEventListener('click', loadSettings);

// ── Init ───────────────────────────────────────────────────────────────
loadSettings();
listRuns();
// Refresh runs list every 10s
setInterval(listRuns, 10000);
</script>
</body>
</html>
